name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  create-release:
    name: Create Nightly Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.id }}
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Compute tag
        id: tag
        run: echo "value=nightly-$(date -u +%Y%m%d%H%M%S)-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Create nightly release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.value }}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Nightly ${{ steps.tag.outputs.value }}" \
            --prerelease
          RELEASE_ID=$(gh api "/repos/$GITHUB_REPOSITORY/releases/tags/${{ steps.tag.outputs.value }}" --jq '.id')
          echo "id=$RELEASE_ID" >> $GITHUB_OUTPUT

  build-macos:
    name: macOS (universal)
    needs: [create-release]
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: macos-latest
    environment: ${{ github.event_name == 'push' && 'Release' || '' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        run: |
          rustup toolchain install stable \
            --target aarch64-apple-darwin \
            --target x86_64-apple-darwin \
            --profile minimal \
            --no-self-update
          rustup default stable
          echo "CARGO_INCREMENTAL=0" >> $GITHUB_ENV
          echo "CARGO_TERM_COLOR=always" >> $GITHUB_ENV

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - run: bun install

      - name: Configure Apple signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No Apple certificate configured, skipping signing setup"
            exit 0
          fi
          echo "APPLE_CERTIFICATE=$APPLE_CERTIFICATE" >> $GITHUB_ENV
          echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD" >> $GITHUB_ENV
          echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> $GITHUB_ENV
          echo "APPLE_ID=$APPLE_ID" >> $GITHUB_ENV
          echo "APPLE_ID_PASSWORD=$APPLE_ID_PASSWORD" >> $GITHUB_ENV
          echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> $GITHUB_ENV
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ github.event_name == 'push' && '--target universal-apple-darwin -c src-tauri/tauri.release.conf.json' || '--target universal-apple-darwin' }}
          tauriScript: bunx tauri
          tagName: ${{ needs.create-release.outputs.tag }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          prerelease: true
          includeUpdaterJson: ${{ github.event_name == 'push' }}

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: macos-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: macos-updater
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.sig
          if-no-files-found: warn

  build-windows:
    name: Windows (x64)
    needs: [create-release]
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: windows-latest
    environment: ${{ github.event_name == 'push' && 'Release' || '' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        shell: bash
        run: |
          rustup toolchain install stable \
            --target x86_64-pc-windows-msvc \
            --profile minimal \
            --no-self-update
          rustup default stable
          echo "CARGO_INCREMENTAL=0" >> $GITHUB_ENV
          echo "CARGO_TERM_COLOR=always" >> $GITHUB_ENV

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - run: bun install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ github.event_name == 'push' && '-c src-tauri/tauri.release.conf.json' || '' }}
          tauriScript: bunx tauri
          tagName: ${{ needs.create-release.outputs.tag }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          prerelease: true
          includeUpdaterJson: ${{ github.event_name == 'push' }}
          updaterJsonPreferNsis: true

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: windows-nsis
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
          if-no-files-found: warn

  build-linux:
    name: Linux (x64)
    needs: [create-release]
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: ubuntu-22.04
    environment: ${{ github.event_name == 'push' && 'Release' || '' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        run: |
          rustup toolchain install stable \
            --target x86_64-unknown-linux-gnu \
            --profile minimal \
            --no-self-update
          rustup default stable
          echo "CARGO_INCREMENTAL=0" >> $GITHUB_ENV
          echo "CARGO_TERM_COLOR=always" >> $GITHUB_ENV

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            file

      - run: bun install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ github.event_name == 'push' && '-c src-tauri/tauri.release.conf.json' || '' }}
          tauriScript: bunx tauri
          tagName: ${{ needs.create-release.outputs.tag }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          prerelease: true
          includeUpdaterJson: ${{ github.event_name == 'push' }}

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: linux-appimage
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.sig
          if-no-files-found: warn

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: linux-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: warn

  build-android:
    name: Android (APK + AAB)
    needs: [create-release]
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: ubuntu-22.04
    environment: ${{ github.event_name == 'push' && 'Release' || '' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        run: |
          rustup toolchain install stable \
            --target aarch64-linux-android \
            --target armv7-linux-androideabi \
            --target i686-linux-android \
            --target x86_64-linux-android \
            --profile minimal \
            --no-self-update
          rustup default stable
          echo "CARGO_INCREMENTAL=0" >> $GITHUB_ENV
          echo "CARGO_TERM_COLOR=always" >> $GITHUB_ENV

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" "tools" "platform-tools"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Install latest Android NDK
        run: |
          LATEST_NDK=$(sdkmanager --list 2>/dev/null | grep -oP '^\s+ndk;\K\S+' | sort -V | tail -1)
          sdkmanager "ndk;$LATEST_NDK"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/$LATEST_NDK" >> $GITHUB_ENV

      - run: bun install

      - name: Decode keystore
        if: ${{ env.ANDROID_KEYSTORE != '' }}
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: echo "$ANDROID_KEYSTORE" | base64 --decode > "$RUNNER_TEMP/keystore.jks"

      - name: Build Android
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE != '' && format('{0}/keystore.jks', env.RUNNER_TEMP) || '' }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          bunx tauri android build \
            --apk \
            --aab \
            --target aarch64 \
            --target armv7 \
            --target x86_64

      - name: Upload release assets
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk \
            src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab \
            --clobber

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
          if-no-files-found: warn

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: android-aab
          path: src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
          if-no-files-found: warn

  build-ios:
    name: iOS
    needs: [create-release]
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: macos-latest
    environment: ${{ github.event_name == 'push' && 'Release' || '' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        run: |
          rustup toolchain install stable \
            --target aarch64-apple-ios \
            --target aarch64-apple-ios-sim \
            --target x86_64-apple-ios \
            --profile minimal \
            --no-self-update
          rustup default stable
          echo "CARGO_INCREMENTAL=0" >> $GITHUB_ENV
          echo "CARGO_TERM_COLOR=always" >> $GITHUB_ENV

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - run: bun install

      - name: Install iOS certificate and provisioning profile
        if: ${{ env.IOS_CERTIFICATE != '' }}
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE: ${{ secrets.IOS_PROVISION_PROFILE }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/ios-build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$IOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/ios-certificate.p12"
          security import "$RUNNER_TEMP/ios-certificate.p12" \
            -k "$KEYCHAIN_PATH" -P "$IOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          PP_PATH="$RUNNER_TEMP/build.mobileprovision"
          echo "$IOS_PROVISION_PROFILE" | base64 --decode > "$PP_PATH"
          PP_UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision

      - name: Build iOS (signed)
        if: ${{ env.IOS_CERTIFICATE != '' }}
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: bunx tauri ios build --export-method app-store-connect

      - name: Build iOS (simulator)
        if: ${{ env.IOS_CERTIFICATE == '' }}
        run: bunx tauri ios build --target aarch64-sim

      - name: Upload release assets
        if: github.event_name == 'push' && env.IOS_CERTIFICATE != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            src-tauri/gen/apple/build/arm64/*.ipa \
            --clobber

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: ios-ipa
          path: src-tauri/gen/apple/build/arm64/*.ipa
          if-no-files-found: warn
