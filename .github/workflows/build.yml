name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  create-release:
    name: Create Nightly Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.id }}
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Compute tag
        id: tag
        run: echo "value=nightly-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        id: release
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: Nightly ${{ steps.tag.outputs.value }}
          prerelease: true
          make_latest: false

  build-macos:
    name: macOS (universal)
    needs: [create-release]
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: macos-latest
    environment: ${{ github.event_name == 'push' && 'Release' || '' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install

      - name: Configure Apple signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No Apple certificate configured, skipping signing setup"
            exit 0
          fi
          echo "APPLE_CERTIFICATE=$APPLE_CERTIFICATE" >> $GITHUB_ENV
          echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD" >> $GITHUB_ENV
          echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> $GITHUB_ENV
          echo "APPLE_ID=$APPLE_ID" >> $GITHUB_ENV
          echo "APPLE_ID_PASSWORD=$APPLE_ID_PASSWORD" >> $GITHUB_ENV
          echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> $GITHUB_ENV
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ github.event_name == 'push' && '--target universal-apple-darwin -c src-tauri/tauri.release.conf.json' || '--target universal-apple-darwin' }}
          tauriScript: bunx tauri
          tagName: ${{ needs.create-release.outputs.tag }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          prerelease: true
          uploadUpdaterJson: ${{ github.event_name == 'push' }}

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: macos-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: macos-updater
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.sig
          if-no-files-found: warn

  build-windows:
    name: Windows (x64)
    needs: [create-release]
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: windows-latest
    environment: ${{ github.event_name == 'push' && 'Release' || '' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ github.event_name == 'push' && '-c src-tauri/tauri.release.conf.json' || '' }}
          tauriScript: bunx tauri
          tagName: ${{ needs.create-release.outputs.tag }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          prerelease: true
          uploadUpdaterJson: ${{ github.event_name == 'push' }}
          updaterJsonPreferNsis: true

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: windows-nsis
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
          if-no-files-found: warn

  build-linux:
    name: Linux (x64)
    needs: [create-release]
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: ubuntu-22.04
    environment: ${{ github.event_name == 'push' && 'Release' || '' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            file

      - run: bun install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ github.event_name == 'push' && '-c src-tauri/tauri.release.conf.json' || '' }}
          tauriScript: bunx tauri
          tagName: ${{ needs.create-release.outputs.tag }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          prerelease: true
          uploadUpdaterJson: ${{ github.event_name == 'push' }}

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: linux-appimage
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.sig
          if-no-files-found: warn

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: linux-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: warn

  build-android:
    name: Android (APK + AAB)
    needs: [create-release]
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: ubuntu-22.04
    environment: ${{ github.event_name == 'push' && 'Release' || '' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            i686-linux-android,
            x86_64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK r27
        run: sdkmanager "ndk;27.0.12077973"

      - run: bun install

      - name: Decode keystore
        if: ${{ env.ANDROID_KEYSTORE != '' }}
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: echo "$ANDROID_KEYSTORE" | base64 --decode > "$RUNNER_TEMP/keystore.jks"

      - name: Build Android
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE != '' && format('{0}/keystore.jks', env.RUNNER_TEMP) || '' }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          bunx tauri android build \
            --apk \
            --aab \
            --target aarch64 \
            --target armv7 \
            --target x86_64

      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
          if-no-files-found: warn

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: android-aab
          path: src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
          if-no-files-found: warn

  build-ios:
    name: iOS
    needs: [create-release]
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: macos-latest
    environment: ${{ github.event_name == 'push' && 'Release' || '' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-apple-ios,
            aarch64-apple-ios-sim,
            x86_64-apple-ios

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install

      - name: Install iOS certificate and provisioning profile
        if: ${{ env.IOS_CERTIFICATE != '' }}
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE: ${{ secrets.IOS_PROVISION_PROFILE }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/ios-build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$IOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/ios-certificate.p12"
          security import "$RUNNER_TEMP/ios-certificate.p12" \
            -k "$KEYCHAIN_PATH" -P "$IOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          PP_PATH="$RUNNER_TEMP/build.mobileprovision"
          echo "$IOS_PROVISION_PROFILE" | base64 --decode > "$PP_PATH"
          PP_UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision

      - name: Build iOS (signed)
        if: ${{ env.IOS_CERTIFICATE != '' }}
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: bunx tauri ios build --export-method app-store-connect

      - name: Build iOS (simulator)
        if: ${{ env.IOS_CERTIFICATE == '' }}
        run: bunx tauri ios build --target aarch64-sim

      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: src-tauri/gen/apple/build/arm64/*.ipa

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: ios-ipa
          path: src-tauri/gen/apple/build/arm64/*.ipa
          if-no-files-found: warn
